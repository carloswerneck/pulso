<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Pulso</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <h1>Pulso</h1>
      <p id="erroMsg" class="login-erro">Usuário ou senha incorretos.</p>
      <form id="formLogin" action="/login" method="post">
        <div class="form-group">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" name="usuario" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">Entrar</button>
      </form>
    </div>
  </div>
  <script>
    // Detecta se veio redirecionado com erro via fetch
    const params = new URLSearchParams(location.search);
    if (params.get('erro')) {
      document.getElementById('erroMsg').classList.add('visivel');
    }

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = new URLSearchParams(new FormData(form));
      const res = await fetch('/login', { method: 'POST', body: data });
      if (res.ok || res.redirected) {
        window.location = '/';
      } else {
        document.getElementById('erroMsg').classList.add('visivel');
      }
    });
  </script>
</body>
</html>
